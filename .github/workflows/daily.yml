name: Daily Contribution

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily progress
        run: |
          echo "## $(date -u +'%Y-%m-%d')" >> daily-progress.md
          echo "Daily learning progress updated." >> daily-progress.md
          echo "" >> daily-progress.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-progress.md
          git commit -m "Update daily progress" || exit 0
          git push
